services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: simple_learning_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - simple_learning_network
    depends_on:
      - db
    environment:
      - PHP_OPCACHE_ENABLE=1

  webserver:
    image: nginx:alpine
    container_name: simple_learning_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - simple_learning_network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: simple_learning_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: simple_learning
      POSTGRES_USER: simple_user
      POSTGRES_PASSWORD: simple_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - simple_learning_network

  node:
    image: node:20-alpine
    container_name: simple_learning_node
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - simple_learning_network
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev

networks:
  simple_learning_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
